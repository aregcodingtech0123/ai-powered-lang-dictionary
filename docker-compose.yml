services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dictionary-backend
    ports:
      - "3001:3001"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PORT: 3001
      CORS_ORIGIN: http://frontend:3000
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dictionary-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - path: ./frontend/.env.local
        required: false
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
