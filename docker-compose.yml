services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dictionary-backend
    ports:
      - "3001:3001"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PORT: 3001
      # localhost origins are always allowed; CORS_ORIGIN adds Docker/extra hosts.
      CORS_ORIGIN: http://frontend:3000
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${NEXT_PUBLIC_EMAILJS_SERVICE_ID:-}
        NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${NEXT_PUBLIC_EMAILJS_TEMPLATE_ID:-}
        NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${NEXT_PUBLIC_EMAILJS_PUBLIC_KEY:-}
        NEXT_PUBLIC_ADMIN_EMAIL: ${NEXT_PUBLIC_ADMIN_EMAIL:-}
    container_name: dictionary-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - path: ./frontend/.env.local
        required: false
    environment:
      # Browser calls the published host port; SSR inside Docker uses the service name.
      NEXT_PUBLIC_SITE_URL: https://vocabeacon.com
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_URL: http://backend:3001
      NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${NEXT_PUBLIC_EMAILJS_SERVICE_ID:-}
      NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${NEXT_PUBLIC_EMAILJS_TEMPLATE_ID:-}
      NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${NEXT_PUBLIC_EMAILJS_PUBLIC_KEY:-}
      NEXT_PUBLIC_ADMIN_EMAIL: ${NEXT_PUBLIC_ADMIN_EMAIL:-}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
