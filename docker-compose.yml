services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dictionary-backend
    ports:
      - "3001:3001"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PORT: 3001
      # Browser on the host uses Origin http://localhost:3000, not the Docker service name.
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: dictionary-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - path: ./frontend/.env.local
        required: false
    environment:
      # Browser calls the published host port; SSR inside Docker uses the service name.
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_URL: http://backend:3001
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
